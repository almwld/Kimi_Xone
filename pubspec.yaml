name: flex_yemen
description: Flex Yemen - منصة التجارة الإلكترونية اليمنية
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  flutter_animate: ^4.5.0
  carousel_slider: ^5.0.0
  shimmer: ^3.0.0
  provider: ^6.1.1
  supabase_flutter: ^2.5.0
  hive_flutter: ^1.1.0
  path_provider: ^2.1.1
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  intl: ^0.18.1
  url_launcher: ^6.2.5
  share_plus: ^9.0.0
  connectivity_plus: ^6.0.3
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^17.0.0
  flutter_screenutil: ^5.9.0
  google_fonts: ^6.1.0
  flutter_typeahead: ^5.0.1
  badges: ^3.1.2
  flutter_slidable: ^3.0.1
  dotted_border: ^2.1.0
  photo_view: ^0.14.0
  flutter_rating_bar: ^4.0.1
  timeline_tile: ^2.0.0
  flutter_staggered_grid_view: ^0.7.0
  confetti: ^0.7.0
  lottie: ^3.0.0
  animated_text_kit: ^4.2.2
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.10
  package_info_plus: ^8.0.0
  device_info_plus: ^9.1.2
  permission_handler: ^11.3.0
  local_auth: ^2.2.0
  encrypt: ^5.0.1
  crypto: ^3.0.3
  uuid: ^4.3.3
  logger: ^2.0.2
  dio: ^5.4.0
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/icons/svg/
    - assets/animations/
    - assets/fonts/

  fonts:
    - family: Changa
      fonts:
        - asset: assets/fonts/Changa-SemiBold.ttf
          weight: 600

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#D4AF37"
  image: assets/images/splash_logo.png
  android: true
  ios: true
