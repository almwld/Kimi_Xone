name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
      
      - name: Create Android folder
        run: |
          # نسخ الملفات مؤقتاً
          mkdir -p /tmp/flex_code
          cp -r lib /tmp/flex_code/
          cp -r assets /tmp/flex_code/ 2>/dev/null || true
          cp pubspec.yaml /tmp/flex_code/
          
          # حذف مجلد android القديم
          rm -rf android ios
          
          # إنشاء مشروع جديد مع مجلد android
          flutter create --platforms=android --project-name=flex_yemen --org com.flexyemen ./temp_project
          
          # نسخ مجلد android
          cp -r temp_project/android .
          
          # استعادة الكود والأصول
          rm -rf lib assets
          cp -r /tmp/flex_code/lib .
          cp -r /tmp/flex_code/assets . 2>/dev/null || true
          cp /tmp/flex_code/pubspec.yaml .
          
          # تنظيف
          rm -rf temp_project /tmp/flex_code
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Build APK
        run: flutter build apk --release
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
