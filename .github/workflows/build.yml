name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Create Android folder
        run: |
          flutter create --platforms=android --project-name=flex_yemen --org com.flexyemen ./temp_android
          cp -r temp_android/android .
          rm -rf temp_android

      - name: Fix Kotlin and Gradle versions
        run: |
          # تحديث Kotlin إلى 1.9.22
          sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.22"/' android/build.gradle
          sed -i 's/implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk8:.*/implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.22"/' android/app/build.gradle
          
          # تحديث Gradle wrapper
          echo "distributionUrl=https\\://services.gradle.org/distributions/gradle-8.7-all.zip" > android/gradle/wrapper/gradle-wrapper.properties
          
          # تحديث compileSdk و targetSdk
          sed -i 's/compileSdkVersion [0-9]*/compileSdkVersion 34/' android/app/build.gradle
          sed -i 's/targetSdkVersion [0-9]*/targetSdkVersion 34/' android/app/build.gradle
          sed -i 's/minSdkVersion [0-9]*/minSdkVersion 21/' android/app/build.gradle

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/*.apk
