# Codemagic Configuration File
workflows:
  android-workflow:
    name: Android Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      
    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
        - $HOME/.gradle/caches
        
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
        - pattern: develop
          include: true
          
    scripts:
      - name: Get Flutter packages
        script: flutter packages pub get
        
      - name: Analyze code
        script: flutter analyze
        
      - name: Run tests
        script: flutter test
        
      - name: Build Android APK
        script: flutter build apk --release
        
      - name: Build Android AAB
        script: flutter build appbundle --release
        
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/bundle/release/*.aab
      
    publishing:
      email:
        recipients:
          - developer@flexyemen.com

  ios-workflow:
    name: iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.flexyemen.app
        
    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
        
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          
    scripts:
      - name: Get Flutter packages
        script: flutter packages pub get
        
      - name: Install pods
        script: |
          cd ios
          pod install
          
      - name: Build iOS
        script: flutter build ios --release
        
    artifacts:
      - build/ios/ipa/*.ipa
      
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_API_KEY
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        
      email:
        recipients:
          - developer@flexyemen.com
